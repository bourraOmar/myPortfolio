<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmOps Mobile Demo</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- NAVIGATION -->
    <nav class="navbar">
      <div class="logo">
        <a href="index.html" style="text-decoration: none; color: var(--text-white);">
          <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
      </div>
    </nav>

    <!-- PROJECT HEADER -->
    <header class="project-detail-header" style="text-align: center; padding: 50px 10%;">
      <p class="label">— Case Study</p>
      <h1 class="main-title" style="font-size: 4rem;">FarmOps <span>Mobile</span></h1>
      <p class="hero-desc" style="max-width: 600px; margin: 20px auto;">
        La gestion agricole dans votre poche. Scrollez dans le téléphone pour voir l'application.
      </p>
      <div class="tech-stack" style="justify-content: center; margin-top: 20px;">
        <span>React Native</span><span>Expo</span>
      </div>
    </header>

    <!-- DEMO SECTION -->
    <section class="demo-section" style="padding: 50px 10% 100px;">
      
      <!-- SMARTPHONE MOCKUP -->
      <div class="smartphone-mockup">
        <div class="smartphone-screen">
          <div class="slider-track">
            <div class="slide"><img src="./img/FarmsOps Mobile/home page.png" alt="Home" /></div>
            <div class="slide"><img src="./img/FarmsOps Mobile/farm page.png" alt="Farm" /></div>
            <div class="slide"><img src="./img/FarmsOps Mobile/herd page.png" alt="Herd" /></div>
            <div class="slide"><img src="./img/FarmsOps Mobile/profile page.png" alt="Profile" /></div>
          </div>
        </div>
      </div>

      <div class="slider-controls">
        <button class="slider-btn prev-btn"><i class="fas fa-chevron-left"></i></button>
        <div class="dot-indicators">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <button class="slider-btn next-btn"><i class="fas fa-chevron-right"></i></button>
      </div>

    </section>

    <script src="script.js"></script>
  </body>
</html>
