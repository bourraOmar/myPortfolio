<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Rent Pro Demo</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- NAVIGATION -->
    <nav class="navbar">
      <div class="logo">
        <a href="index.html" style="text-decoration: none; color: var(--text-white);">
          <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
      </div>
    </nav>

    <!-- PROJECT HEADER -->
    <header class="project-detail-header" style="text-align: center; padding: 50px 10%;">
      <p class="label">— Case Study</p>
      <h1 class="main-title" style="font-size: 4rem;">Auto Rent <span>Pro</span></h1>
      <p class="hero-desc" style="max-width: 600px; margin: 20px auto;">
        Plateforme complète de location et gestion de flotte automobile. Scrollez dans l'ordinateur pour explorer la maquette.
      </p>
      <div class="tech-stack" style="justify-content: center; margin-top: 20px;">
        <span>Laravel 11</span><span>Tailwind CSS</span><span>MySQL</span>
      </div>
    </header>

    <!-- DEMO SECTION -->
    <section class="demo-section" style="padding: 50px 2% 100px; max-width: 1200px; margin: 0 auto;">
      
      <div class="mockup-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 20px;">
        <!-- Left Arrow -->
        <button class="slider-btn prev-btn" style="flex-shrink: 0; width: 50px; height: 50px; font-size: 1.5rem;"><i class="fas fa-chevron-left"></i></button>

        <!-- LAPTOP MOCKUP -->
        <div class="macbook-mockup" style="margin: 0; width: 100%;">
          <div class="macbook-screen">
            <div class="slider-track">
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 4.webp" alt="Desktop 3" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 5.webp" alt="Desktop 3" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 1.webp" alt="Desktop 1" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 2.webp" alt="Desktop 2" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 3.webp" alt="Desktop 3" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 6.webp" alt="Desktop 3" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 7.webp" alt="Desktop 3" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 12.webp" alt="Desktop 3" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 10.webp" alt="Desktop 3" /></div>
              <div class="slide"><img src="./img/Maquettage Desktop/Desktop - 11.webp" alt="Desktop 3" /></div>
            </div>
          </div>
          <div class="macbook-base">
            <div class="macbook-notch"></div>
          </div>
        </div>

        <!-- Right Arrow -->
        <button class="slider-btn next-btn" style="flex-shrink: 0; width: 50px; height: 50px; font-size: 1.5rem;"><i class="fas fa-chevron-right"></i></button>
      </div>

      <div class="slider-controls" style="margin-top: 60px;">
        <div class="dot-indicators">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

    </section>

    <script src="script.js"></script>
  </body>
</html>
